<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a4f44" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Energy Watch" />
    <title>Stromkosten sparen!</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Stromkosten sparen!</h1>
      <p class="subtitle">Erhalte Benachrichtigungen über billigen Strom</p>

      <section class="card">
        <h2>Benachrichtigungen konfigurieren</h2>
        <label class="toggle-row" for="notificationToggle">
          <span id="notificationToggleState">Benachrichtigungen aus</span>
          <span class="toggle-switch">
            <input id="notificationToggle" type="checkbox" />
            <span class="toggle-slider"></span>
          </span>
        </label>
        <p id="permissionState" class="small"></p>
      </section>

      <section class="card">
        <h2>Current Status</h2>
        <button id="refreshBtn" class="secondary">Refresh</button>
        <p id="cheapestRange" class="small"></p>
        <pre id="status"></pre>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
