<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a4f44" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Energy Watch" />
    <title>Stromkosten sparen!</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              pine: '#12322f',
              mint: '#0a7b68',
              mintDark: '#0b5e51',
              mist: '#f2f7f6'
            }
          }
        }
      };
    </script>
  </head>
  <body class="min-h-screen bg-mist text-pine">
    <div class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(circle_at_12%_10%,#d4efe6_0%,transparent_35%),radial-gradient(circle_at_90%_0%,#d7e9ff_0%,transparent_32%)]"></div>
    <main class="mx-auto max-w-2xl px-4 pb-12 pt-6 sm:px-6">
      <h1 class="text-3xl font-bold tracking-tight">Stromkosten sparen!</h1>
      <p class="mb-6 mt-1 text-sm text-pine/80 sm:text-base">Erhalte Benachrichtigungen über billigen Strom</p>

      <section class="mb-4 rounded-2xl border border-emerald-100 bg-white p-4 shadow-[0_8px_22px_rgba(18,50,47,0.08)] sm:p-5">
        <h2 class="text-lg font-semibold">Benachrichtigungen konfigurieren</h2>
        <label for="notificationToggle" class="mt-3 flex items-center justify-between gap-3">
          <span id="notificationToggleState" class="text-sm">Benachrichtigungen aus</span>
          <span class="relative inline-flex h-8 w-14 items-center">
            <input id="notificationToggle" type="checkbox" class="peer sr-only" />
            <span class="h-8 w-14 rounded-full bg-slate-300 transition-colors peer-checked:bg-mint"></span>
            <span class="pointer-events-none absolute left-1 h-6 w-6 rounded-full bg-white shadow transition-transform peer-checked:translate-x-6"></span>
          </span>
        </label>
        <p id="permissionState" class="mt-2 text-xs text-pine/80"></p>
      </section>

      <section class="rounded-2xl border border-emerald-100 bg-white p-4 shadow-[0_8px_22px_rgba(18,50,47,0.08)] sm:p-5">
        <div class="mb-3 flex items-center justify-between gap-3">
          <h2 class="text-lg font-semibold">Current Status</h2>
          <button
            id="refreshBtn"
            class="rounded-xl bg-mintDark px-4 py-2 text-sm font-medium text-white transition hover:opacity-95 disabled:cursor-not-allowed disabled:opacity-60"
          >
            Refresh
          </button>
        </div>
        <p id="cheapestRange" class="mb-3 text-xs text-pine/80"></p>
        <pre id="status" class="max-h-80 overflow-auto rounded-lg border border-emerald-100 bg-emerald-50/50 p-3 text-xs leading-relaxed sm:text-sm"></pre>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
