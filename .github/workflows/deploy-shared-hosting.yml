name: Deploy To Shared Hosting (PHP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required deployment secrets
        env:
          FTP_SERVER: ${{ secrets.WEBHOSTING_FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.WEBHOSTING_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.WEBHOSTING_FTP_PASSWORD }}
          TARGET_DIR: ${{ secrets.WEBHOSTING_TARGET_DIR }}
          WEBSITE_CHECK_SECRET: ${{ secrets.WEBSITE_CHECK_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ] || [ -z "$TARGET_DIR" ]; then
            echo "Missing one or more required secrets:"
            echo "WEBHOSTING_FTP_SERVER, WEBHOSTING_FTP_USERNAME, WEBHOSTING_FTP_PASSWORD, WEBHOSTING_TARGET_DIR"
            exit 1
          fi
          if [ -z "$WEBSITE_CHECK_SECRET" ] || [ -z "$VAPID_PUBLIC_KEY" ] || [ -z "$VAPID_PRIVATE_KEY" ] || [ -z "$VAPID_SUBJECT" ]; then
            echo "Missing one or more required push/config secrets:"
            echo "WEBSITE_CHECK_SECRET, VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT"
            exit 1
          fi

      - name: Install PHP dependencies for push delivery
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Assemble deploy folder
        env:
          WEBSITE_CHECK_SECRET: ${{ secrets.WEBSITE_CHECK_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          rm -rf deploy
          mkdir -p deploy
          cp .htaccess deploy/.htaccess
          cp -R public/. deploy/
          cp -R api deploy/api
          mkdir -p deploy/data
          cp data/.gitkeep deploy/data/.gitkeep
          cp composer.json deploy/composer.json
          cp -R vendor deploy/vendor
          printf '%s\n' \
            'APG_BASE_URL=https://transparency.apg.at/api' \
            'APG_LANGUAGE=English' \
            'APG_RESOLUTION=PT15M' \
            'APG_DAY_OFFSET=0' \
            "WEBSITE_CHECK_SECRET=$WEBSITE_CHECK_SECRET" \
            "VAPID_PUBLIC_KEY=$VAPID_PUBLIC_KEY" \
            "VAPID_PRIVATE_KEY=$VAPID_PRIVATE_KEY" \
            "VAPID_SUBJECT=$VAPID_SUBJECT" \
            > deploy/.env

      - name: Deploy files via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.WEBHOSTING_FTP_SERVER }}
          username: ${{ secrets.WEBHOSTING_FTP_USERNAME }}
          password: ${{ secrets.WEBHOSTING_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./deploy/
          server-dir: ${{ secrets.WEBHOSTING_TARGET_DIR }}
