name: Scheduled Source Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run-check:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger secure check endpoint
        env:
          CHECK_URL: ${{ secrets.WEBSITE_CHECK_URL }}
          WEBSITE_CHECK_SECRET: ${{ secrets.WEBSITE_CHECK_SECRET }}
        run: |
          if [ -z "$CHECK_URL" ] || [ -z "$WEBSITE_CHECK_SECRET" ]; then
            echo "Missing WEBSITE_CHECK_URL or WEBSITE_CHECK_SECRET repo secret"
            exit 1
          fi

          http_code=$(curl -sS \
            --retry 5 \
            --retry-all-errors \
            --retry-delay 5 \
            --connect-timeout 15 \
            --max-time 60 \
            -o /tmp/scheduled-check-response.txt \
            -w "%{http_code}" \
            -X POST "$CHECK_URL" \
            -H "Authorization: Bearer $WEBSITE_CHECK_SECRET" \
            -H "Content-Type: application/json") || curl_exit=$?

          if [ -n "$curl_exit" ]; then
            echo "Warning: scheduled check could not reach $CHECK_URL after retries (curl exit $curl_exit)."
            echo "Skipping failure to avoid noisy GitHub alerts for transient connectivity issues."
            exit 0
          fi

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Warning: scheduled check returned HTTP $http_code."
            cat /tmp/scheduled-check-response.txt
            echo "Skipping failure to avoid noisy GitHub alerts."
            exit 0
          fi
